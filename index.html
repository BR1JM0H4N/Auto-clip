<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto-clip OCR • Tesseract.js</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #22c55e;
      --accent-2: #0ea5e9;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at top right, #1d4ed833, transparent 40%), var(--bg);
      color: var(--text);
      padding: 24px;
      min-height: 100vh;
    }

    .app {
      max-width: 1000px;
      margin: 0 auto;
      background: linear-gradient(145deg, #0b1220, var(--panel));
      border: 1px solid #374151;
      border-radius: 16px;
      padding: 20px;
      display: grid;
      gap: 18px;
    }

    h1 { margin: 0; font-size: 1.5rem; }
    p { margin: 0; color: var(--muted); line-height: 1.45; }

    .card {
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 16px;
      background: #0b1220;
      display: grid;
      gap: 12px;
    }

    input[type="file"], select {
      width: 100%;
      background: #111827;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 10px;
      padding: 10px;
    }

    .row { display: grid; gap: 10px; grid-template-columns: 1fr 180px; }

    button {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; }

    .progress-wrap {
      width: 100%;
      height: 14px;
      border-radius: 999px;
      background: #1f2937;
      overflow: hidden;
      border: 1px solid #374151;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #14b8a6);
      transition: width 0.2s linear;
    }

    .status {
      color: #cbd5e1;
      font-size: 0.92rem;
      min-height: 1.4rem;
    }

    textarea {
      width: 100%;
      min-height: 300px;
      background: #020617;
      color: #e2e8f0;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      line-height: 1.4;
      resize: vertical;
    }

    .warn { color: #fbbf24; }
    .error { color: var(--danger); }

    @media (max-width: 700px) {
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>OCR Extractor (Tesseract.js)</h1>
      <p>Upload bulk JPG/PNG images and multi-page PDFs. Extracted text can be downloaded as a <code>.txt</code> file. Supported OCR languages: English + Hindi.</p>
    </header>

    <section class="card">
      <label for="files"><strong>Choose files (images and PDFs)</strong></label>
      <input id="files" type="file" accept="image/png,image/jpeg,image/jpg,application/pdf" multiple />

      <div class="row">
        <div>
          <label for="language"><strong>OCR Language</strong></label>
          <select id="language">
            <option value="eng+hin" selected>English + Hindi (eng+hin)</option>
            <option value="eng">English only (eng)</option>
            <option value="hin">Hindi only (hin)</option>
          </select>
        </div>
        <div>
          <label><strong>Output format</strong></label>
          <input value=".txt" disabled />
        </div>
      </div>

      <div class="actions">
        <button id="startBtn">Start OCR</button>
        <button id="saveBtn" disabled>Save as TXT</button>
        <button id="clearBtn">Clear</button>
      </div>

      <div class="progress-wrap" aria-label="OCR progress">
        <div id="progressBar" class="progress-bar"></div>
      </div>
      <div id="status" class="status">Waiting for files.</div>
    </section>

    <section class="card">
      <label for="output"><strong>Extracted Text</strong></label>
      <textarea id="output" placeholder="OCR result appears here..."></textarea>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.min.mjs" type="module"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script type="module">
    import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.min.mjs';

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.worker.min.mjs';

    const filesInput = document.getElementById('files');
    const languageSelect = document.getElementById('language');
    const startBtn = document.getElementById('startBtn');
    const saveBtn = document.getElementById('saveBtn');
    const clearBtn = document.getElementById('clearBtn');
    const progressBar = document.getElementById('progressBar');
    const status = document.getElementById('status');
    const output = document.getElementById('output');

    const imageTypes = new Set(['image/png', 'image/jpeg', 'image/jpg']);

    const updateStatus = (message, cssClass = '') => {
      status.textContent = message;
      status.className = `status ${cssClass}`.trim();
    };

    const setProgress = (value) => {
      const normalized = Math.max(0, Math.min(100, value));
      progressBar.style.width = `${normalized}%`;
    };

    const countTotalUnits = async (files) => {
      let units = 0;
      for (const file of files) {
        if (imageTypes.has(file.type)) {
          units += 1;
        } else if (file.type === 'application/pdf') {
          const buffer = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
          units += pdf.numPages;
        }
      }
      return units;
    };

    const processPdfPage = async (pdf, pageNo, worker, currentUnit, totalUnits) => {
      const page = await pdf.getPage(pageNo);
      const viewport = page.getViewport({ scale: 2 });
      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d');
      canvas.width = viewport.width;
      canvas.height = viewport.height;

      await page.render({ canvasContext: context, viewport }).promise;

      const { data: { text } } = await worker.recognize(canvas);
      updateStatus(`Processing ${currentUnit}/${totalUnits} • PDF page ${pageNo}/${pdf.numPages}`);
      return text;
    };

    const processImageFile = async (file, worker, currentUnit, totalUnits) => {
      const { data: { text } } = await worker.recognize(file);
      updateStatus(`Processing ${currentUnit}/${totalUnits} • Image: ${file.name}`);
      return text;
    };

    startBtn.addEventListener('click', async () => {
      const files = Array.from(filesInput.files || []);

      if (!files.length) {
        updateStatus('Please select at least one image or PDF file.', 'warn');
        return;
      }

      startBtn.disabled = true;
      saveBtn.disabled = true;
      output.value = '';
      setProgress(0);

      let worker;
      try {
        const selectedLang = languageSelect.value;
        updateStatus('Initializing OCR engine...');

        const totalUnits = await countTotalUnits(files);
        if (totalUnits === 0) {
          throw new Error('No supported JPG, PNG, or PDF files found.');
        }

        let completedUnits = 0;
        const allText = [];

        worker = await Tesseract.createWorker(selectedLang, 1, {
          logger: (m) => {
            if (m.status === 'recognizing text') {
              const overall = ((completedUnits + m.progress) / totalUnits) * 100;
              setProgress(overall);
            }
          }
        });

        for (const file of files) {
          if (imageTypes.has(file.type)) {
            completedUnits += 1;
            const text = await processImageFile(file, worker, completedUnits, totalUnits);
            allText.push(`===== ${file.name} =====\n${text.trim()}\n`);
            setProgress((completedUnits / totalUnits) * 100);
          } else if (file.type === 'application/pdf') {
            const buffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;

            for (let pageNo = 1; pageNo <= pdf.numPages; pageNo += 1) {
              completedUnits += 1;
              const text = await processPdfPage(pdf, pageNo, worker, completedUnits, totalUnits);
              allText.push(`===== ${file.name} | Page ${pageNo} =====\n${text.trim()}\n`);
              setProgress((completedUnits / totalUnits) * 100);
            }
          }
        }

        output.value = allText.join('\n').trim();
        saveBtn.disabled = !output.value;
        updateStatus(`Done! Processed ${totalUnits} item(s).`, '');
        setProgress(100);
      } catch (error) {
        console.error(error);
        updateStatus(`OCR failed: ${error.message}`, 'error');
      } finally {
        if (worker) {
          await worker.terminate();
        }
        startBtn.disabled = false;
      }
    });

    saveBtn.addEventListener('click', () => {
      const text = output.value.trim();
      if (!text) {
        updateStatus('No extracted text available to save.', 'warn');
        return;
      }

      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `ocr-output-${new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-')}.txt`;
      a.click();
      URL.revokeObjectURL(url);
      updateStatus('TXT file downloaded successfully.');
    });

    clearBtn.addEventListener('click', () => {
      filesInput.value = '';
      output.value = '';
      saveBtn.disabled = true;
      setProgress(0);
      updateStatus('Cleared. Waiting for files.');
    });
  </script>
</body>
</html>
